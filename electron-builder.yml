appId: com.makrown.app
productName: Makrown
directories:
  buildResources: build
  output: dist
npmRebuild: false
files:
  - out/**/*
  - "!out/**/*.map"
publish:
  provider: github
  owner: 0livrdavid
  repo: makrown
mac:
  target:
    - dmg
    - zip
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  artifactName: ${name}-${version}-${arch}.${ext}
win:
  target:
    - nsis
  artifactName: ${name}-${version}-${arch}.${ext}
